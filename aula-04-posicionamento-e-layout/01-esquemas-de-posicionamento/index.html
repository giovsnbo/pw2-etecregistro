<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquemas de Posicionamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Positions - Comparação visual</h2>

    <div class="caixa static">Static</div>

    <div class="caixa relative">Relative</div>
    <!-- O posicionamento relative mantém seu espaço reservado no fluxo do documento -->
    <div class="caixa static">Static</div>

    <div class="caixa absolute">Absolute</div>
    <div class="caixa static">Static</div>
    <div class="caixa absolute sup">Absolute</div>
    <!-- Position absolute desloca o elemento do fluxo natural(cria uma camada flutuante). É possível controlar o empilhamento com a propriedade z-index -->

    <div class="caixa fixed">Fixed</div>
    <!-- Position fixed trava um elemento na tela a partir de um posicionamento especíifico -->

    <div class="sticky">Sticky</div>

    <div class="espaco">Espaço</div>



</body>
</html>
