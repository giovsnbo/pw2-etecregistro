<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exemplos de Display</h1>
    <br> <hr> <br>

    <h2>display: block</h2>
    <div class="block">Bloco 1</div>
    <div class="block">Bloco 2</div>
    <!-- Características do Block:
    - Ocupa toda a linha
    - Aceita width e height, margin e padding
    - SEMPRE quebra linha -->

    <h2>display: inline</h2>
    <div class="inline">Texto Inline 1</div>
    <div class="inline">Texto Inline 2</div>
    <!-- Características do Inline:
    - Não quebra linha
    - Ocupa apenas o espaço do conteúdo,
    - Não aceita width e height -->

    <h2>display: inline-block</h2>
    <div class="inline-block">Elemento visual 1</div>
    <div class="inline-block">Elemento visual 2</div>
    <!-- Características do inline-block:
    - Fica na mesma linha mistura características de inline e block. 
    - O elemento flui como inline, mas pode ter largura e altura definidas como block. -->
</body>
</html>
